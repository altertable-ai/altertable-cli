name: Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test CLI
    runs-on: ubuntu-latest
    services:
      altertable:
        image: ghcr.io/altertable-ai/altertable-mock:latest
        ports:
          - 15000:15000
        env:
          ALTERTABLE_MOCK_USERS: testuser:testpass
        options: >-
          --health-cmd "exit 0"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 3
          --health-start-period 10s

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: cli

      - name: Typecheck
        run: bun run typecheck
        working-directory: cli

      - name: Lint
        run: bun run lint
        working-directory: cli

      - name: Check formatting
        run: bun run format:check
        working-directory: cli

      - name: Dead code check (knip)
        run: bun run knip
        working-directory: cli

      - name: Verify OpenAPI generated files are up to date
        run: |
          bun run generate
          git diff --exit-code src/generated/openapi-types.ts src/generated/openapi-operations.ts
        working-directory: cli

      - name: Unit tests with coverage
        run: bun run test:coverage
        working-directory: cli

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: cli-coverage-lcov
          path: cli/coverage/lcov.info
          if-no-files-found: error

      - name: Build JS bundle
        run: bun run build
        working-directory: cli

      - name: Verify package contents
        run: bun run pack:check
        working-directory: cli

      - name: Verify executable
        run: |
          chmod +x bin/altertable
          bin/altertable --version
          bin/altertable --help

      - name: Run configure tests
        run: ./tests/configure_test.sh

      - name: Run management tests
        run: ./tests/management_test.sh

      - name: Run context tests
        run: ./tests/context_test.sh

      - name: Run catalogs tests
        run: ./tests/catalogs_test.sh

      - name: Run scripting tests
        run: ./tests/scripting_test.sh

      - name: Run profile tests
        run: ./tests/profile_test.sh

      - name: Run integration tests
        run: ./tests/integration_test.sh

  compile:
    name: Compile binaries (${{ matrix.artifact }})
    runs-on: ${{ matrix.runs-on }}
    needs: test
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            artifact: altertable-linux-x64
            runs-on: ubuntu-latest
          - target: bun-linux-arm64
            artifact: altertable-linux-arm64
            runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install and build
        run: |
          cd cli
          bun install --frozen-lockfile
          bun run build
          bun build --compile --target=${{ matrix.target }} src/cli.ts --outfile ../dist/${{ matrix.artifact }}

      - name: Smoke test compiled binary
        run: |
          chmod +x dist/${{ matrix.artifact }}
          dist/${{ matrix.artifact }} --version
          dist/${{ matrix.artifact }} --help

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
