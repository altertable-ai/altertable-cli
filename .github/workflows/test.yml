name: Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Canonical verification
    uses: ./.github/workflows/verify.yml
    with:
      ref: ${{ github.sha }}

  release-matrix:
    name: Resolve release matrix
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Export typed release matrix
        id: matrix
        run: echo "matrix=$(bun run cli/scripts/release.ts matrix)" >> "$GITHUB_OUTPUT"

  compile:
    name: Compile binary (${{ matrix.artifact }})
    needs: [verify, release-matrix]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.release-matrix.outputs.matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: cli

      - name: Verify release contract
        run: bun run release:verify
        working-directory: cli

      - name: Compile hardened standalone binary
        run: bun run release:build --target=${{ matrix.target }}
        working-directory: cli

      - name: Smoke test compiled binary
        run: bun run release:smoke --target=${{ matrix.target }}
        working-directory: cli

      - name: Upload compiled binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 7

  required:
    name: Required
    needs: [verify, release-matrix, compile]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions: {}

    steps:
      - name: Enforce required CI results
        env:
          VERIFY_RESULT: ${{ needs.verify.result }}
          RELEASE_MATRIX_RESULT: ${{ needs.release-matrix.result }}
          COMPILE_RESULT: ${{ needs.compile.result }}
        run: |
          failed=0
          for outcome in \
            "Canonical verification:${VERIFY_RESULT}" \
            "Release matrix:${RELEASE_MATRIX_RESULT}" \
            "Native compilation:${COMPILE_RESULT}"
          do
            name="${outcome%%:*}"
            result="${outcome#*:}"
            if [ "$result" != "success" ]; then
              echo "::error title=${name} failed::Result: ${result}"
              failed=1
            fi
          done
          exit "$failed"
