name: Release Please

on:
  push:
    branches:
      - main

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-artifacts:
    name: Build and publish release artifacts
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          registry-url: "https://registry.npmjs.org"

      - name: Log build environment
        run: bun --version

      - name: Build CLI bundle
        run: |
          cd cli
          bun install --frozen-lockfile
          bun run build

      - name: Compile release binaries
        run: |
          mkdir -p dist
          cd cli
          bun build --compile --target=bun-darwin-arm64 src/cli.ts --outfile ../dist/altertable-darwin-arm64
          bun build --compile --target=bun-darwin-x64 src/cli.ts --outfile ../dist/altertable-darwin-x64
          bun build --compile --target=bun-linux-x64 src/cli.ts --outfile ../dist/altertable-linux-x64
          bun build --compile --target=bun-linux-arm64 src/cli.ts --outfile ../dist/altertable-linux-arm64
          cp dist/cli.js ../dist/altertable-cli.js
          cd ../dist && shasum -a 256 altertable-* altertable-cli.js > checksums.txt

      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/altertable-*
            dist/altertable-cli.js
            dist/checksums.txt

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/altertable-* dist/altertable-cli.js dist/checksums.txt --clobber

      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
        working-directory: cli
