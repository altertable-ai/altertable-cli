name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing draft release tag to recover (for example, v1.2.0)
        required: true
        type: string

permissions: {}

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    name: Prepare release
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Prepare release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-context:
    name: Resolve release context
    needs: release-please
    if: always() && (github.event_name == 'workflow_dispatch' || needs.release-please.result == 'success')
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      should_release: ${{ steps.context.outputs.should_release }}
      tag_name: ${{ steps.context.outputs.tag_name }}
      release_ref: ${{ steps.context.outputs.release_ref }}

    steps:
      - name: Resolve automatic or recovery release
        id: context
        env:
          AUTOMATIC_RELEASE_CREATED: ${{ needs.release-please.outputs.release_created }}
          AUTOMATIC_TAG: ${{ needs.release-please.outputs.tag_name }}
          GH_TOKEN: ${{ github.token }}
          RECOVERY_TAG: ${{ inputs.release_tag }}
          TRIGGER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ ! "${RECOVERY_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
              echo "::error::Invalid recovery release tag: ${RECOVERY_TAG}"
              exit 1
            fi

            release_json="$(gh release view "${RECOVERY_TAG}" --repo "${GITHUB_REPOSITORY}" --json isDraft,targetCommitish)"
            is_draft="$(jq -r '.isDraft' <<<"${release_json}")"
            release_ref="$(jq -r '.targetCommitish' <<<"${release_json}")"
            if [[ "${is_draft}" != "true" ]]; then
              echo "::error::Release ${RECOVERY_TAG} is not a draft"
              exit 1
            fi
            if [[ ! "${release_ref}" =~ ^[0-9a-f]{40}$ ]]; then
              echo "::error::Draft ${RECOVERY_TAG} is not pinned to an immutable commit SHA"
              exit 1
            fi

            {
              echo "should_release=true"
              echo "tag_name=${RECOVERY_TAG}"
              echo "release_ref=${release_ref}"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          {
            echo "should_release=${AUTOMATIC_RELEASE_CREATED}"
            echo "tag_name=${AUTOMATIC_TAG}"
            echo "release_ref=${TRIGGER_SHA}"
          } >> "${GITHUB_OUTPUT}"

  release-matrix:
    name: Resolve release matrix
    needs: [release-context, verify-release]
    if: needs.release-context.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Check out released revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Draft releases do not create a fetchable Git tag until publication.
          # Verify the release PR merge that triggered this workflow instead.
          ref: ${{ needs.release-context.outputs.release_ref }}

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Export typed release matrix
        id: matrix
        run: echo "matrix=$(bun run cli/scripts/release.ts matrix)" >> "$GITHUB_OUTPUT"

  release-native:
    name: Build and test release binary (${{ matrix.artifact }})
    needs: [release-context, verify-release, release-matrix]
    if: needs.release-context.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.release-matrix.outputs.matrix) }}

    steps:
      - name: Check out released revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ needs.release-context.outputs.release_ref }}

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: cli

      - name: Verify release contract
        run: bun run release:verify --tag=${{ needs.release-context.outputs.tag_name }}
        working-directory: cli

      - name: Compile release binary
        run: bun run release:build --target=${{ matrix.target }}
        working-directory: cli

      - name: Smoke test release binary
        run: bun run release:smoke --target=${{ matrix.target }}
        working-directory: cli

      - name: Upload tested release binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 30

  verify-release:
    name: Canonical release verification
    needs: release-context
    if: needs.release-context.outputs.should_release == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/verify.yml
    with:
      ref: ${{ needs.release-context.outputs.release_ref }}

  release-artifacts:
    name: Verify, attest, and publish release
    needs: [release-context, release-native]
    if: needs.release-context.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write

    steps:
      - name: Check out released revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ needs.release-context.outputs.release_ref }}
          submodules: recursive

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install Node.js for npm provenance
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: cli

      - name: Verify release tag and toolchain
        run: bun run release:verify --tag=${{ needs.release-context.outputs.tag_name }}
        working-directory: cli

      - name: Download tested release binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-altertable-*
          path: dist
          merge-multiple: true

      - name: Build JavaScript release bundle
        run: bun run release:build --bundle
        working-directory: cli

      - name: Finalize exact release artifacts
        run: bun run release:finalize --tag=${{ needs.release-context.outputs.tag_name }}
        working-directory: cli

      - name: Smoke test npm bundle on release toolchain
        run: bun run scripts/smoke-npm-bundle.ts
        working-directory: cli

      - name: Install minimum supported npm runtime
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.1.0

      - name: Smoke test exact npm bundle on minimum runtime
        run: bun run scripts/smoke-npm-bundle.ts --expected-bun=1.1.0
        working-directory: cli

      - name: Restore release build toolchain
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Verify release checksums
        run: sha256sum --check checksums.txt
        working-directory: dist

      - name: Attest release provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-checksums: dist/checksums.txt

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-context.outputs.tag_name }}
        run: bun run release:upload-github
        working-directory: cli

      - name: Publish npm package
        run: bun run release:publish-npm
        working-directory: cli

      - name: Publish completed GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-context.outputs.tag_name }}
        run: bun run release:publish-github
        working-directory: cli
